name: PR Validation

on:
  # Automatic trigger on PR create/update
  pull_request:
    types: [opened, synchronize, reopened]
  # Manual trigger for testing
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build

      - name: Check build output
        run: |
          echo "Build completed successfully!"
          ls -la dist/
